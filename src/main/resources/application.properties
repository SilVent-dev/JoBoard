spring.application.name=joboard

# Porta: plataformas de deploy (Railway/Render) injetam PORT; local usa 8080.
server.port=${PORT:8080}

# Segredos vem de variaveis de ambiente (ver DEPLOY.md).
# Em dev, application-local.properties (fora do git) fornece os valores.
spring.config.import=optional:classpath:application-local.properties

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Upload de curriculo: PDF ate 5MB (o default do Spring e 1MB e barraria arquivos validos)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

api.security.token.secret=${JWT_SECRET:}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.url.base=${APP_URL_BASE:http://localhost:8080}
app.url.frontend=${APP_URL_FRONTEND:http://localhost:5173}

# Remetente dos emails. Em producao com Resend: onboarding@resend.dev (dominio de teste)
# ou um endereco de dominio verificado. Vazio em dev (usa o padrao do SMTP).
app.mail.from=${MAIL_FROM:}

# Origens permitidas no CORS (separadas por virgula)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

spring.sql.init.mode=always

# Flyway: schema legado (criado pelo ddl-auto) fica como baseline 0;
# a partir daqui toda mudanca de schema entra como migracao versionada
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Supabase
supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:curriculos}
