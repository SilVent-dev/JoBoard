# Perfil de producao — ativado com SPRING_PROFILES_ACTIVE=prod
# Sobrepoe apenas o necessario; o resto vem de application.properties.

# O schema e gerenciado pelo Flyway. Em producao o Hibernate NAO deve alterar
# o banco — apenas validar que as entidades batem com o schema migrado.
spring.jpa.hibernate.ddl-auto=validate

# Sem log de SQL em producao (ruido + custo).
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
